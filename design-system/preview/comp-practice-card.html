<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  body{padding:28px;width:700px}
</style></head><body>
<div style="width:340px">
<div class="practice-card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div class="loc"><img src="../assets/icons/pin-yellow-plain-icon.svg" width="14" alt="">Central London</div>
    <div class="ref">Ref. 14-01-3449</div>
  </div>
  <div class="specs">
    <div>Four Surgeries</div>
    <div class="row" style="gap:6px"><img src="../assets/icons/leasehold-black-plain-icon.svg" width="11" alt="">Leasehold</div>
    <div><span class="badge badge-nhs">NHS</span></div>
    <div class="avail"><img src="../assets/icons/available-green-plain-icon.svg" width="14" alt="">Available</div>
  </div>
  <div class="divide"></div>
  <div class="price-row"><span class="k">Fee income:</span><span class="v">£1,988,329</span></div>
  <div class="price-row asking"><span class="k">Asking price:</span><span class="v">£1,371,947</span></div>
  <a class="link-gold" style="margin-top:4px">View Details →</a>
</div>
</div></body></html>
