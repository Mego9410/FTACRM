<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .ico{display:flex;flex-direction:column;align-items:center;gap:8px}
  .cap{font-size:10.5px;color:var(--fg-3)}
</style></head><body>
<div class="col" style="gap:18px">
  <div class="lbl">Primary feature discs — white glyph on gold disc</div>
  <div class="row">
    <div class="ico"><img src="../assets/icons/icon1-circle-white-yellow-value-your-practice.svg" width="58" height="58" alt=""><span class="cap">Value</span></div>
    <div class="ico"><img src="../assets/icons/icon2-circle-white-yellow-become-a-member.svg" width="58" height="58" alt=""><span class="cap">Member</span></div>
    <div class="ico"><img src="../assets/icons/icon33-circle-white-yellow-seller-only-representation.svg" width="58" height="58" alt=""><span class="cap">Seller</span></div>
    <div class="ico"><img src="../assets/icons/icon44-circle-white-yellow-guided-from-first-step.svg" width="58" height="58" alt=""><span class="cap">Guided</span></div>
    <div class="ico"><img src="../assets/icons/icon11-circle-white-yellow-your-journey-with-frank-taylor.svg" width="58" height="58" alt=""><span class="cap">Journey</span></div>
    <div class="ico"><img src="../assets/icons/icon22-circle-white-yellow-vetted-buyers.svg" width="58" height="58" alt=""><span class="cap">Buyers</span></div>
  </div>
  <div class="lbl" style="margin-top:4px">Journey row — gold glyph on neutral disc</div>
  <div class="row">
    <div class="ico"><img src="../assets/icons/icon1-circle-yellow-white-your-journey-with-frank-taylor.svg" width="58" height="58" alt=""></div>
    <div class="ico"><img src="../assets/icons/icon2-circle-yellow-white-vetted-buyers.svg" width="58" height="58" alt=""></div>
    <div class="ico"><img src="../assets/icons/icon3-circle-yellow-white-seller-only-representation.svg" width="58" height="58" alt=""></div>
    <div class="ico"><img src="../assets/icons/icon4-circle-yellow-white-guided-from-first-step.svg" width="58" height="58" alt=""></div>
  </div>
</div>
</body></html>
