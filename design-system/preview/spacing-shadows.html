<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .cap{font-size:11.5px;color:var(--fg-3);margin-top:8px;text-align:center;font-family:ui-monospace,monospace}
  body{background:var(--surface-2)}
</style></head><body>
<div class="col" style="gap:18px"><div class="lbl">Elevation</div>
<div class="row" style="gap:26px">
<div class="col" style="align-items:center"><div style="width:88px;height:72px;background:#fff;border-radius:16px;box-shadow:var(--shadow-xs)"></div><div class="cap">xs</div></div><div class="col" style="align-items:center"><div style="width:88px;height:72px;background:#fff;border-radius:16px;box-shadow:var(--shadow-sm)"></div><div class="cap">sm</div></div><div class="col" style="align-items:center"><div style="width:88px;height:72px;background:#fff;border-radius:16px;box-shadow:var(--shadow-md)"></div><div class="cap">md</div></div><div class="col" style="align-items:center"><div style="width:88px;height:72px;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg)"></div><div class="cap">lg</div></div><div class="col" style="align-items:center"><div style="width:88px;height:72px;background:#fff;border-radius:16px;box-shadow:var(--shadow-gold)"></div><div class="cap">gold</div></div>
</div></div></body></html>
