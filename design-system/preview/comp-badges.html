<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  
</style></head><body>
<div class="col" style="gap:16px">
  <div class="lbl">Status pills & badges</div>
  <div class="row">
    <span class="badge badge-nhs">NHS</span>
    <span class="badge badge-mixed">Mixed</span>
    <span class="badge badge-private">Private</span>
    <span class="badge-tip badge">Selling Tips</span>
  </div>
  <div class="row" style="gap:24px">
    <span class="avail"><img src="../assets/icons/available-green-plain-icon.svg" width="15" height="15" alt=""> Available</span>
    <span class="row" style="gap:6px;font-weight:700;color:var(--fg-1)"><img src="../assets/icons/pin-yellow-plain-icon.svg" width="13" alt=""> Central London</span>
    <span class="row" style="gap:6px;color:var(--fg-2)"><img src="../assets/icons/leasehold-black-plain-icon.svg" width="11" alt=""> Leasehold</span>
    <span class="stars row" style="gap:3px"><img src="../assets/icons/star-yellow-plain-icon.svg" width="15" alt=""><img src="../assets/icons/star-yellow-plain-icon.svg" width="15" alt=""><img src="../assets/icons/star-yellow-plain-icon.svg" width="15" alt=""><img src="../assets/icons/star-yellow-plain-icon.svg" width="15" alt=""><img src="../assets/icons/star-yellow-plain-icon.svg" width="15" alt=""></span>
  </div>
</div></body></html>
