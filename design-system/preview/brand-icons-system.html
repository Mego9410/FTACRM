<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .ico{display:flex;flex-direction:column;align-items:center;gap:8px}
  .cap{font-size:10.5px;color:var(--fg-3)}
  
</style></head><body>
<div class="col" style="gap:16px">
<div class="lbl">Social — gold discs</div>
<div class="row" style="gap:14px">
<img src="../assets/icons/instagram-white-yellow-circle-icon.svg" width="40" height="40" alt=""><img src="../assets/icons/facebook-white-yellow-circle-icon.svg" width="40" height="40" alt=""><img src="../assets/icons/x-white-yellow-circle-icon.svg" width="40" height="40" alt=""><img src="../assets/icons/linkedin-white-yellow-circle-icon.svg" width="40" height="40" alt=""><img src="../assets/icons/youtube-white-yellow-circle-icon.svg" width="40" height="40" alt=""><img src="../assets/icons/whatsapp-white-yellow-circle-icon.svg" width="40" height="40" alt="">
</div>
<div class="lbl" style="margin-top:6px">Arrows & controls</div>
<div class="row" style="gap:18px;align-items:center">
  <img src="../assets/icons/right-yellow-plain-arrow.svg" height="16" alt="">
  <img src="../assets/icons/right-black-plain-arrow.svg" height="16" alt="">
  <img src="../assets/icons/down-yellow-plain-arrow.svg" height="10" alt="">
  <img src="../assets/icons/right-white-yellow-circle-arrow.svg" width="38" alt="">
  <img src="../assets/icons/left-white-yellow-circle-arrow.svg" width="38" alt="">
  <img src="../assets/icons/play-yellow-white-circle-icon.svg" width="38" alt="">
  <img src="../assets/icons/up-white-yellow-square-arrow.svg" width="34" alt="">
</div>
<div class="lbl" style="margin-top:6px">Inline status glyphs</div>
<div class="row" style="gap:20px;align-items:center">
  <span class="row" style="gap:6px;font-size:14px"><img src="../assets/icons/pin-yellow-plain-icon.svg" height="16" alt=""> Location</span>
  <span class="row" style="gap:6px;font-size:14px"><img src="../assets/icons/leasehold-black-plain-icon.svg" height="15" alt=""> Leasehold</span>
  <span class="row" style="gap:6px;font-size:14px"><img src="../assets/icons/available-green-plain-icon.svg" height="15" alt=""> Available</span>
  <span class="row" style="gap:4px"><img src="../assets/icons/star-yellow-plain-icon.svg" height="15" alt=""></span>
</div>
</div></body></html>
