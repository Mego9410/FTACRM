<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:12px;align-items:center}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3)}
  
</style></head><body><div class="col" style="gap:10px"><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">Display · 64 / 800</div>
    <div style="font-size:52px;font-weight:800;letter-spacing:-0.02em;color:var(--fg-1)">Confident value</div>
  </div><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">H1 · 48 / 800</div>
    <div style="font-size:40px;font-weight:800;letter-spacing:-0.02em;color:var(--fg-1)">Confident value</div>
  </div><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">H2 · 34 / 800</div>
    <div style="font-size:30px;font-weight:800;letter-spacing:-0.02em;color:var(--fg-1)">Confident value</div>
  </div><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">H3 · 22 / 700</div>
    <div style="font-size:22px;font-weight:800;letter-spacing:-0.02em;color:var(--fg-1)">Confident value</div>
  </div><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">Lead · 18 / 400</div>
    <div style="font-size:18px;font-weight:500;letter-spacing:0;color:var(--fg-1)">Confident value</div>
  </div><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">Body · 16 / 400</div>
    <div style="font-size:16px;font-weight:500;letter-spacing:0;color:var(--fg-1)">Confident value</div>
  </div><div class="row" style="gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px">
    <div style="width:120px" class="lbl">Small · 14 / 500</div>
    <div style="font-size:14px;font-weight:500;letter-spacing:0;color:var(--fg-1)">Confident value</div>
  </div></div></body></html>
