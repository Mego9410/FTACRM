<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:12px;align-items:center}
  .col{display:flex;flex-direction:column}
  .grid{display:grid;gap:14px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .sw{border-radius:14px;height:84px;display:flex;align-items:flex-end;padding:10px;border:1px solid rgba(0,0,0,.05)}
  .name{font-size:12.5px;font-weight:700;margin-top:8px;color:var(--fg-1)}
  .hex{font-size:11.5px;color:var(--fg-3);font-family:ui-monospace,monospace}
  .grid{grid-template-columns:repeat(5,1fr)}
</style></head><body>
<div class="col" style="gap:14px">
  <div class="lbl">Ink & warm greys</div>
  <div class="grid">
    <div><div class="sw" style="background:var(--ink-pure);color:#fff"></div><div class="name">Black</div><div class="hex">#090909</div></div>
    <div><div class="sw" style="background:var(--ink);color:#fff"></div><div class="name">Ink</div><div class="hex">#0F0F0A</div></div>
    <div><div class="sw" style="background:var(--fg-2);color:#fff"></div><div class="name">FG-2 body</div><div class="hex">#5E5E5A</div></div>
    <div><div class="sw" style="background:var(--fg-3);color:#fff"></div><div class="name">FG-3 meta</div><div class="hex">#8C8C88</div></div>
    <div><div class="sw" style="background:var(--fg-4);color:#fff"></div><div class="name">FG-4</div><div class="hex">#B6B6B2</div></div>
  </div>
</div></body></html>
