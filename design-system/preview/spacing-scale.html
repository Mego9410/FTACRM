<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .cap{font-size:11.5px;color:var(--fg-3);margin-top:8px;text-align:center;font-family:ui-monospace,monospace}
  
</style></head><body>
<div class="col" style="gap:12px"><div class="lbl">Spacing scale · 4px base</div>
<div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-1</div><div style="height:14px;width:4px;background:var(--gold);border-radius:3px"></div><div class="cap">4px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-2</div><div style="height:14px;width:8px;background:var(--gold);border-radius:3px"></div><div class="cap">8px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-3</div><div style="height:14px;width:12px;background:var(--gold);border-radius:3px"></div><div class="cap">12px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-4</div><div style="height:14px;width:16px;background:var(--gold);border-radius:3px"></div><div class="cap">16px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-6</div><div style="height:14px;width:24px;background:var(--gold);border-radius:3px"></div><div class="cap">24px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-8</div><div style="height:14px;width:32px;background:var(--gold);border-radius:3px"></div><div class="cap">32px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-12</div><div style="height:14px;width:48px;background:var(--gold);border-radius:3px"></div><div class="cap">48px</div></div><div class="row" style="gap:14px"><div style="width:64px" class="cap" >sp-16</div><div style="height:14px;width:64px;background:var(--gold);border-radius:3px"></div><div class="cap">64px</div></div>
</div></body></html>
