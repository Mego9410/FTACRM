<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .cap{font-size:11.5px;color:var(--fg-3);margin-top:8px;text-align:center;font-family:ui-monospace,monospace}
  
</style></head><body>
<div class="col" style="gap:14px"><div class="lbl">Corner radii</div>
<div class="row" style="gap:20px">
<div class="col" style="align-items:center"><div style="width:78px;height:78px;background:var(--gold-tint);border:1.5px solid var(--gold);border-radius:var(--r-xs)"></div><div class="cap">xs · 8px</div></div><div class="col" style="align-items:center"><div style="width:78px;height:78px;background:var(--gold-tint);border:1.5px solid var(--gold);border-radius:var(--r-sm)"></div><div class="cap">sm · 12px</div></div><div class="col" style="align-items:center"><div style="width:78px;height:78px;background:var(--gold-tint);border:1.5px solid var(--gold);border-radius:var(--r-md)"></div><div class="cap">md · 16px</div></div><div class="col" style="align-items:center"><div style="width:78px;height:78px;background:var(--gold-tint);border:1.5px solid var(--gold);border-radius:var(--r-lg)"></div><div class="cap">lg · 20px</div></div><div class="col" style="align-items:center"><div style="width:78px;height:78px;background:var(--gold-tint);border:1.5px solid var(--gold);border-radius:var(--r-xl)"></div><div class="cap">xl · 28px</div></div><div class="col" style="align-items:center"><div style="width:78px;height:78px;background:var(--gold-tint);border:1.5px solid var(--gold);border-radius:var(--r-pill)"></div><div class="cap">pill · 999px</div></div>
</div></div></body></html>
