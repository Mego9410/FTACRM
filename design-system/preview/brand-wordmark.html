<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:12px;align-items:center}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3)}
  
  .plate{background:var(--gold);border-radius:14px;padding:18px 30px;display:inline-block}
  .plate img{height:46px;display:block}

</style></head><body>
<div class="col" style="gap:18px">
  <div class="row" style="gap:24px;align-items:center">
    <div class="plate"><img src="../assets/logo.png" alt="Frank Taylor & Associates"></div>
    <div class="col" style="gap:4px">
      <div class="lbl">Primary wordmark</div>
      <div style="font-size:14px;color:var(--fg-2);max-width:300px">Serif lettering on a gold plate. Used in the nav and footer.</div>
    </div>
  </div>
  <div class="row" style="gap:14px">
    <div style="background:var(--ink-pure);border-radius:14px;padding:14px 24px"><img src="../assets/logo.png" style="height:34px;display:block" alt=""></div>
    <div style="border:1px solid var(--border);border-radius:14px;padding:14px 24px"><img src="../assets/logo.png" style="height:34px;display:block" alt=""></div>
  </div>
</div></body></html>
