<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  body{background:var(--surface-2)}
</style></head><body>
<div class="search-panel" style="max-width:560px">
  <div style="font-weight:700;color:var(--fg-1);margin-bottom:12px">Where are you looking?</div>
  <div class="row" style="gap:10px;flex-wrap:nowrap">
    <input class="field" placeholder="e.g. London, N1">
    <a class="btn btn-primary">Buy</a>
    <a class="btn btn-dark">Sell</a>
  </div>
</div></body></html>
