<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:700px;background:var(--surface);font-family:var(--font-sans);padding:28px;color:var(--fg-1)}
  .row{display:flex;gap:12px;align-items:center}
  .col{display:flex;flex-direction:column}
  .grid{display:grid;gap:14px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-3)}
  .sw{border-radius:14px;height:84px;display:flex;align-items:flex-end;padding:10px;border:1px solid rgba(0,0,0,.05)}
  .name{font-size:12.5px;font-weight:700;margin-top:8px;color:var(--fg-1)}
  .hex{font-size:11.5px;color:var(--fg-3);font-family:ui-monospace,monospace}
  .grid{grid-template-columns:repeat(4,1fr)}
</style></head><body>
<div class="col" style="gap:14px">
  <div class="lbl">Surfaces & borders</div>
  <div class="grid">
    <div><div class="sw" style="background:var(--surface);color:rgba(0,0,0,.25)"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div><div class="sw" style="background:var(--surface-2);color:rgba(0,0,0,.25)"></div><div class="name">Band</div><div class="hex">#F4F4F3</div></div>
    <div><div class="sw" style="background:var(--surface-3);color:rgba(0,0,0,.25)"></div><div class="name">Card fill</div><div class="hex">#EFEFEE</div></div>
    <div><div class="sw" style="background:var(--border);color:rgba(0,0,0,.25)"></div><div class="name">Hairline</div><div class="hex">#E7E7E4</div></div>
  </div>
</div></body></html>
